services:
  traefik:
    image: traefik:v3.6
    container_name: hermes-traefik
    ports:
      - "80:80"
      - "8080:8080"   # dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
    networks:
      - hermes-network

networks:
  hermes-network:
    external: true
