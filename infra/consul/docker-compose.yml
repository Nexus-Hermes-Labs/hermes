services:
  consul:
    image: hashicorp/consul:latest
    container_name: hermes-consul
    restart: always
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    command: "agent -dev -client=0.0.0.0 -ui"
    volumes:
      - consul_data:/consul/data
    networks:
      - hermes-network

volumes:
  consul_data:

networks:
  hermes-network:
    external: true
